<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NESASIN SCOUT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

/* PARTICLES */
#particles-js{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 8%;
  background:rgba(20,10,0,0.7);
  backdrop-filter:blur(10px);
  z-index:1000;
}

nav h2{
  color:#facc15;
}

nav a{
  color:#fff;
  margin:0 10px;
  text-decoration:none;
  position:relative;
}

/* PEMBATAS */
nav a:not(:last-child)::after{
  content:"|";
  position:absolute;
  right:-12px;
  color:#facc15;
}

nav a:hover{
  color:#facc15;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  background:linear-gradient(135deg,#1c0d00,#3b1f00,#1c0d00);
}

.hero h1{
  font-size:55px;
  color:#facc15;
  text-shadow:0 0 30px rgba(250,204,21,0.7);
}

.hero p{
  margin-top:10px;
  font-size:20px;
  color:#fde68a;
}

.btn{
  margin-top:20px;
  padding:12px 25px;
  background:#facc15;
  color:black;
  border:none;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.08);
  background:#eab308;
}

/* SECTION */
section{
  padding:100px 10%;
  text-align:center;
}

/* WARNA PER SECTION */
#2024{
  background:linear-gradient(135deg,#3b1f00,#78350f,#b45309);
}

#2025{
  background:linear-gradient(135deg,#4c1d00,#92400e,#f59e0b);
}

#2026{
  background:linear-gradient(135deg,#5a2a00,#b45309,#facc15);
}
section h2{
  color:#facc15;
  text-shadow:0 0 15px rgba(250,204,21,0.6);
}
/* BIAR ADA GARIS PEMBATAS HALUS */
section{
  padding:100px 10%;
  text-align:center;
  border-top:2px solid rgba(250,204,21,0.2);
}
/* GALERI */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-top:30px;
}

.gallery img{
  width:100%;
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 15px rgba(250,204,21,0.3);
}

.gallery img:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(250,204,21,0.6);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img{
  max-width:80%;
  max-height:80%;
}

/* AUDIO */
.music-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#facc15;
  color:black;
  border:none;
  padding:12px 18px;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  background:#1c0d00;
  color:#facc15;
}

/* RESPONSIVE */
@media(max-width:768px){
  .hero h1{font-size:32px;}
  .hero p{font-size:16px;}
}
</style>
</head>

<body>

<div id="particles-js"></div>

<!-- NAV -->
<nav>
  <h2>NESASIN SCOUT</h2>
  <div>
    <a href="#beranda">Beranda</a>
    <a href="#2024">2024</a>
    <a href="#2025">2025</a>
    <a href="#2026">2026</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero" id="beranda">
  <div>
    <h1>PRAMUKA NESASIN</h1>
    <p>Beraksi • Berkarya • Berprestasi</p>
    <button class="btn" onclick="location.href='#2024'">Lihat Galeri</button>
  </div>
</section>

<!-- GALERI -->
<section id="2024">

  <img src="profil duaenam (6).jpeg">
  <img src="profil duaenam (7).jpeg">
  <img src="profil duaenam (8).jpeg">
  <img src="profil duaenam (9).jpeg">
  <img src="profil duaenam (10).jpeg">
  <img src="profil duaenam (11).jpeg">
  <img src="profil duaenam (12).jpeg">
  <img src="profil duaenam (13).jpeg">

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
<img id="lightbox-img">
</div>

<!-- AUDIO -->
<audio id="music" loop>
<source src="musik.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">🔊</button>

<footer>© 2026 NESASIN SCOUT</footer>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
// PARTICLES WARNA EMAS
particlesJS("particles-js",{
  particles:{
    number:{value:80},
    color:{value:"#facc15"},
    size:{value:3},
    move:{speed:2},
    line_linked:{
      enable:true,
      color:"#facc15",
      opacity:0.3
    }
  }
});

// LIGHTBOX
const imgs=document.querySelectorAll(".gallery img");
const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");

imgs.forEach(img=>{
  img.onclick=()=>{
    lightbox.style.display="flex";
    lightboxImg.src=img.src;
  }
});
lightbox.onclick=()=>lightbox.style.display="none";

// AUDIO
let music=document.getElementById("music");
function toggleMusic(){
  if(music.paused){music.play();}
  else{music.pause();}
}

window.addEventListener("click",()=>{
  music.play();
},{once:true});
</script>

</body>
</html>
